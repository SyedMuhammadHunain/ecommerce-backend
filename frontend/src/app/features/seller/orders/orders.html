<div class="p-6 max-w-7xl mx-auto">
  <p-toast></p-toast>
  <div class="flex items-center justify-between mb-8">
    <h1 class="text-3xl font-bold text-gray-800">Manage Orders</h1>
  </div>

  <div *ngIf="orderService.isLoading()" class="flex justify-center py-20">
    <p-progressSpinner></p-progressSpinner>
  </div>

  <div *ngIf="!orderService.isLoading()">
    
    <div *ngIf="orderService.orders().length === 0" class="text-center py-20 bg-white rounded-lg shadow-sm">
      <i class="pi pi-box text-6xl text-gray-300 mb-6"></i>
      <h2 class="text-2xl font-semibold mb-2 text-gray-600">No orders Found</h2>
    </div>

    <div *ngIf="orderService.orders().length > 0" class="card shadow-sm">
        <p-table [value]="orderService.orders()" [tableStyle]="{ 'min-width': '50rem' }" styleClass="p-datatable-striped">
            <ng-template pTemplate="header">
                <tr>
                    <th>Order ID</th>
                    <th>Date</th>
                    <th>Customer</th>
                    <th>Amount</th>
                    <th>Status</th>
                    <th>Update</th>
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-order>
                <tr>
                    <td class="font-mono text-sm text-gray-600">{{ order._id | slice:0:8 }}...</td>
                    <td>{{ order.createdAt | date:'medium' }}</td>
                    <td>{{ order.userId | slice:0:6 }}...</td>
                    <td class="font-medium">${{ order.amount | number:'1.2-2' }}</td>
                    <td>
                        <p-tag [value]="order.status | uppercase" [severity]="getSeverity(order.status)"></p-tag>
                    </td>
                    <td>
                      <!-- Dropdown to manually manipulate order process -->
                      <p-select 
                          [options]="statuses" 
                          [(ngModel)]="order.status"
                          (onChange)="updateStatus(order._id, $event.value)"
                          optionLabel="label" 
                          optionValue="value"
                          appendTo="body"
                          [style]="{ width: '130px' }">
                      </p-select>
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>
  </div>
</div>
